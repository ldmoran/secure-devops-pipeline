name: Secure DevOps Pipeline

permissions:
  issues: write
  pull-requests: write
  contents: write

on:
  pull_request:
    branches:
      - test
  push:
    branches:
      - main
      - test

jobs:
  security-check:
    runs-on: ubuntu-latest
    name: Security Check - Vulnerability Classification
    if: github.event_name == 'pull_request' && github.base_ref == 'test'

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Telegram - Start Security Check
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
          -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d "text=🔍 Iniciando análisis de seguridad en PR"

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Check model
        run: |
          if [ ! -f "model/classifier_model.joblib" ]; then
            python model/train_model.py
          fi

      - name: Analyze code
        id: analyze
        continue-on-error: true
        run: |
          cat > /tmp/analyze.py << 'PYEOF'
          import joblib, json, sys, subprocess, numpy as np
          from security_checker.feature_extractor import JavaCodeAnalyzer

          base_ref = "${{ github.base_ref }}"

          model = joblib.load('model/classifier_model.joblib')
          feature_names = json.load(open('model/feature_names.json'))

          result = subprocess.run(
              ['git', 'diff', f'HEAD..origin/{base_ref}', '--name-only'],
              capture_output=True, text=True
          )

          print('=== ARCHIVOS MODIFICADOS ===')
          print(result.stdout)

          files = [f for f in result.stdout.split() if f.endswith('.java')]

          print('=== ARCHIVOS JAVA ===')
          print(files)

          if not files:
              print('NO SE ENCONTRARON ARCHIVOS JAVA')

          vulnerable = False
          mensaje = ''

          for f in files:
              try:
                  code = open(f, 'r', errors='ignore').read()
                  if not code.strip():
                      continue

                  feats = JavaCodeAnalyzer.extract_features(code)
                  X = np.array([feats[n] for n in feature_names]).reshape(1, -1)

                  prediction = model.predict(X)[0]
                  print(f'{f} -> Prediccion: {prediction}')

                  if prediction == 1:
                      vulnerable = True
                      mensaje += f'\nArchivo: {f}\n'

                      if feats['dangerous_function_count'] > 0:
                          mensaje += f'  Funciones peligrosas: {int(feats["dangerous_function_count"])}\n'

                      if feats['sql_pattern_count'] > 0:
                          mensaje += f'  Patrones SQL sospechosos: {int(feats["sql_pattern_count"])}\n'

                      if feats['system_call_count'] > 0:
                          mensaje += f'  Llamadas System: {int(feats["system_call_count"])}\n'

                      if feats['reflection_count'] > 0:
                          mensaje += f'  Uso de reflexion: {int(feats["reflection_count"])}\n'

                      if feats['sanitization_count'] == 0:
                          mensaje += '  No se detectaron mecanismos de sanitizacion\n'

                      mensaje += '\n'

              except Exception as e:
                  print(f'ERROR ANALIZANDO {f}: {e}')

          if vulnerable:
              print(mensaje)
              with open('security_report.txt', 'w', encoding='utf-8') as reporte:
                  reporte.write(mensaje)
              print('VULNERABLE')
              sys.exit(1)
          else:
              print('SAFE')
              sys.exit(0)
          PYEOF
          # Ejecutar con PYTHONPATH apuntando al workspace del repo
          PYTHONPATH=$GITHUB_WORKSPACE python3 /tmp/analyze.py

      - name: Telegram - Codigo SEGURO
        if: steps.analyze.conclusion == 'success'
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
          -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d "text=✅ Código SEGURO. Análisis ML superado. Continuando pipeline."

      - name: Telegram - Codigo VULNERABLE
        if: steps.analyze.outcome == 'failure'
        run: |
          if [ -f security_report.txt ]; then
            MENSAJE=$(cat security_report.txt)
          else
            MENSAJE="No se pudo generar el reporte detallado."
          fi

          curl -s -G "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            --data-urlencode "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            --data-urlencode "text=❌ Vulnerabilidades detectadas:

          $MENSAJE

          PR bloqueado."

      - name: Create Issue
        if: steps.analyze.outcome == 'failure'
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: "Vulnerabilidad detectada",
              body: "Se detectaron vulnerabilidades potenciales. Revisar los logs del pipeline y la notificación enviada por Telegram para obtener más detalles.",
              labels: ["security-issue", "fixing-required"]
            })

      - name: Fail pipeline if vulnerabilities detected
        if: steps.analyze.outcome == 'failure'
        run: |
          echo "Se detectaron vulnerabilidades. Deteniendo pipeline."
          exit 1

  tests:
    runs-on: ubuntu-latest
    name: Unit Tests
    needs: security-check
    if: github.event_name == 'pull_request' && github.base_ref == 'test'

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Python tests
        run: |
          pytest tests/ -v --tb=short

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Run Java tests
        run: |
          mvn test

      - name: Telegram TEST SUCCESS
        if: success()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
          -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d "text=🧪 TESTS OK: Python y Java pasaron correctamente"

      - name: Telegram TEST FAIL
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
          -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d "text=❌ TESTS FALLARON. Pipeline detenido."

      - name: Create Issue for Failed Tests
        if: failure()
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: "Tests fallidos",
              body: "Los tests del pipeline han fallado.",
              labels: ["tests-failed"]
            })

  merge-and-deploy:
    runs-on: ubuntu-latest
    name: Merge to Main and Deploy
    if: false

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

      - name: Merge test to main
        run: |
          git fetch origin main
          git checkout main
          git merge --no-ff origin/test -m "Auto-merge from test branch"
          git push origin main

      - name: Deploy to Render
        run: |
          echo "Deployment triggered - Render webhook will handle the deploy"
          echo "Webhook URL configured in Render dashboard"

      - name: Telegram - Deploy exitoso
        if: success()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
          -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d "text=🚀 Merge test→main exitoso. Deploy en Render iniciado."

      - name: Telegram - Deploy fallido
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
          -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d "text=💥 Falló el merge o deploy hacia main."
      - name: Debug features
              run: |
                cat > /tmp/debug.py << 'PYEOF'
                import joblib, json, sys, numpy as np
                sys.path.insert(0, '${{ env.GITHUB_WORKSPACE }}')
                import os
                sys.path.insert(0, os.environ.get('GITHUB_WORKSPACE', '.'))
                from security_checker.feature_extractor import JavaCodeAnalyzer

                code = open('src/main/java/com/ejemplo/usuarios/service/UsuarioService.java').read()
                feats = JavaCodeAnalyzer.extract_features(code)

                print("=== FEATURES EXTRAIDAS ===")
                for k, v in sorted(feats.items()):
                    print(f"  {k}: {v}")

                feature_names = json.load(open('model/feature_names.json'))
                X = np.array([feats[n] for n in feature_names]).reshape(1, -1)
                print("\n=== VECTOR X ===")
                print(X)

                model = joblib.load('model/classifier_model.joblib')
                pred = model.predict(X)[0]
                proba = model.predict_proba(X)[0]
                print(f"\n=== PREDICCION: {pred} ===")
                print(f"Probabilidad [SAFE, VULN]: {proba}")
                PYEOF
                PYTHONPATH=$GITHUB_WORKSPACE python3 /tmp/debug.py