name: Secure DevOps Pipeline

permissions:
  issues: write
  pull-requests: write
  contents: write

on:
  pull_request:
    branches:
      - test
  push:
    branches:
      - main
      - test

jobs:
  security-check:
    runs-on: ubuntu-latest
    name: Security Check - Vulnerability Classification

    if: github.event_name == 'pull_request' && github.base_ref == 'test'

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Telegram - Start Security Check
        run: |
          curl -s -X POST https://api.telegram.org/bot8620126753:AAHQoU_jR-JaYk55yyvyk6gAPTOs2gpwtDI/sendMessage \
          -d chat_id=6353398881 \
          -d text="🔍 Iniciando análisis de seguridad en PR"

      - uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Check model
        run: |
          if [ ! -f "model/classifier_model.joblib" ]; then
            python model/train_model.py
          fi

      - name: Analyze code
        run: |
          python -c "
          import joblib, json, sys, subprocess, numpy as np
          from security_checker.feature_extractor import JavaCodeAnalyzer

          model = joblib.load('model/classifier_model.joblib')
          feature_names = json.load(open('model/feature_names.json'))

          result = subprocess.run(
              ['git', 'diff', 'HEAD..origin/${{ github.base_ref }}', '--name-only'],
              capture_output=True, text=True
          )

          files = [f for f in result.stdout.split() if f.endswith('.java')]

          vulnerable = False

          for f in files:
              try:
                  code = open(f, 'r', errors='ignore').read()
                  if not code.strip():
                      continue

                  feats = JavaCodeAnalyzer.extract_features(code)
                  X = np.array([feats[n] for n in feature_names]).reshape(1, -1)

                  if model.predict(X)[0] == 1:
                      vulnerable = True
              except:
                  pass

          if vulnerable:
              print('VULNERABLE')
              sys.exit(1)
          else:
              print('SAFE')
              sys.exit(0)
          "
      - name: Telegram SUCCESS
        if: success()
        run: |
          curl -s -X POST https://api.telegram.org/bot8620126753:AAHQoU_JR-JaYk55yyvyk6gAPTOs2gpwtDI/sendMessage \
          -d chat_id=6353398881 \
          -d text="✅ Código SEGURO. Pipeline completado y listo para deploy"

      - name: Telegram FAIL
        if: failure()
        run: |
          curl -s -X POST https://api.telegram.org/bot8620126753:AAHQoU_jR-JaYk55yyvyk6gAPTOs2gpwtDI/sendMessage \
          -d chat_id=6353398881 \
          -d text="❌ Código VULNERABLE detectado"

      - name: Create Issue
        if: failure()
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: "Vulnerabilidad detectada",
              body: "Código vulnerable en PR",
              labels: ["security-issue"]
            })

  tests:
    runs-on: ubuntu-latest
    name: Unit Tests
    needs: security-check
    if: success()
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run tests
        run: |
          pytest tests/ -v --tb=short
      
      - name: Comment PR on test success
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ **All Tests Passed**: Ready for merge'
            })

  merge-and-deploy:
    runs-on: ubuntu-latest
    name: Merge to Main and Deploy
    if: github.ref == 'refs/heads/test'
    
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      
      - name: Configure Git
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
      
      - name: Merge test to main
        run: |
          git fetch origin main
          git checkout main
          git merge --no-ff origin/test -m "Auto-merge from test branch"
          git push origin main
      
      - name: Deploy to Render
        run: |
          echo "Deployment triggered - Render webhook will handle the deploy"
          echo "Webhook URL configured in Render dashboard"
