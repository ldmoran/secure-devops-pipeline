name: Secure DevOps Pipeline

permissions:
  issues: write
  pull-requests: write
  contents: write

on:
  pull_request:
    branches:
      - test
  push:
    branches:
      - main
      - test

jobs:
  security-check:
    runs-on: ubuntu-latest
    name: Security Check - Vulnerability Classification
    if: github.event_name == 'pull_request' && github.base_ref == 'test'

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Telegram - Start Security Check
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage \
          -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
          -d text="🔍 Iniciando análisis de seguridad en PR"

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Check model
        run: |
          if [ ! -f "model/classifier_model.joblib" ]; then
            python model/train_model.py
          fi

      - name: Analyze code
        run: |
          python -c "
          import joblib, json, sys, subprocess, numpy as np
          from security_checker.feature_extractor import JavaCodeAnalyzer

          model = joblib.load('model/classifier_model.joblib')
          feature_names = json.load(open('model/feature_names.json'))

          result = subprocess.run(
              ['git', 'diff', 'HEAD..origin/${{ github.base_ref }}', '--name-only'],
              capture_output=True, text=True
          )

          print('=== ARCHIVOS MODIFICADOS ===')
          print(result.stdout)

          files = [f for f in result.stdout.split() if f.endswith('.java')]

          print('=== ARCHIVOS JAVA ===')
          print(files)

          if not files:
              print('NO SE ENCONTRARON ARCHIVOS JAVA')

          vulnerable = False

          for f in files:
              try:
                  code = open(f, 'r', errors='ignore').read()
                  if not code.strip():
                      continue

                  feats = JavaCodeAnalyzer.extract_features(code)
                  X = np.array([feats[n] for n in feature_names]).reshape(1, -1)

                  prediction = model.predict(X)[0]

                  print(f'{f} -> Predicción: {prediction}')

                  if prediction == 1:
                      vulnerable = True

              except Exception as e:
                  print(f'ERROR ANALIZANDO {f}: {e}')

          if vulnerable:
              print('VULNERABLE')
              sys.exit(1)
          else:
              print('SAFE')
              sys.exit(0)
          "

      - name: Telegram - Codigo SEGURO
        if: success()
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage \
          -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
          -d text="✅ Código SEGURO. Análisis ML superado. Continuando pipeline."

      - name: Telegram - Codigo VULNERABLE
        if: failure()
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage \
          -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
          -d text="❌ Código VULNERABLE detectado. PR bloqueado."

      - name: Create Issue
        if: failure()
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: "Vulnerabilidad detectada",
              body: "Código vulnerable en PR",
              labels: ["security-issue", "fixing-required"]
            })

  tests:
    runs-on: ubuntu-latest
    name: Unit Tests
    needs: security-check
    if: github.event_name == 'pull_request' && github.base_ref == 'test'

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Python tests
        run: |
          pytest tests/ -v --tb=short

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Run Java tests
        run: |
          mvn test

      - name: Telegram TEST SUCCESS
        if: success()
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage \
          -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
          -d text="🧪 TESTS OK: Python y Java pasaron correctamente"

      - name: Telegram TEST FAIL
        if: failure()
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage \
          -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
          -d text="❌ TESTS FALLARON. Pipeline detenido."

      - name: Create Issue for Failed Tests
        if: failure()
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: "Tests fallidos",
              body: "Los tests del pipeline han fallado.",
              labels: ["tests-failed"]
            })

  merge-and-deploy:
    runs-on: ubuntu-latest
    name: Merge to Main and Deploy
    # SIN needs: tests — este job se activa por push, no por PR
    # El push ocurre cuando el PR ya fue aceptado y los cambios están en test
    #if: github.event_name == 'push' && github.ref == 'refs/heads/test'
    if: false

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

      - name: Merge test to main
        run: |
          git fetch origin main
          git checkout main
          git merge --no-ff origin/test -m "Auto-merge from test branch"
          git push origin main

      - name: Deploy to Render
        run: |
          echo "Deployment triggered - Render webhook will handle the deploy"
          echo "Webhook URL configured in Render dashboard"

      - name: Telegram - Deploy exitoso
        if: success()
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage \
          -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
          -d text="🚀 Merge test→main exitoso. Deploy en Render iniciado."

      - name: Telegram - Deploy fallido
        if: failure()
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage \
          -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
          -d text="💥 Falló el merge o deploy hacia main."
# trigger pipeline tests