name: Secure DevOps Pipeline

permissions:
  issues: write
  pull-requests: write
  contents: write

on:
  pull_request:
    branches:
      - test
  push:
    branches:
      - main
      - test

jobs:
  security-check:
    runs-on: ubuntu-latest
    name: Security Check - Vulnerability Classification
    if: github.event_name == 'pull_request' && github.base_ref == 'test'

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Telegram - Start Security Check
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
          -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d "text=🔍 Iniciando análisis de seguridad en PR #${{ github.event.pull_request.number }}"

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Check model
        run: |
          if [ ! -f "model/classifier_model.joblib" ]; then
            python model/train_model.py
          fi

      - name: Analyze code
        id: analyze
        continue-on-error: true
        run: |
          cat > /tmp/analyze.py << 'PYEOF'
          import joblib, json, sys, subprocess, numpy as np
          import os
          from security_checker.feature_extractor import JavaCodeAnalyzer

          base_ref = "${{ github.base_ref }}"

          model = joblib.load('model/classifier_model.joblib')
          scaler = joblib.load('model/scaler.joblib')
          feature_names = json.load(open('model/feature_names.json'))

          result = subprocess.run(
              ['git', 'diff', f'HEAD..origin/{base_ref}', '--name-only'],
              capture_output=True, text=True
          )

          print('=== ARCHIVOS MODIFICADOS ===')
          print(result.stdout)

          files = [f for f in result.stdout.split() if f.endswith('.java')]

          print('=== ARCHIVOS JAVA ===')
          print(files)

          if not files:
              print('NO SE ENCONTRARON ARCHIVOS JAVA')

          vulnerable = False
          mensaje = ''
          reporte_completo = ''

          for f in files:
              try:
                  code = open(f, 'r', errors='ignore').read()
                  if not code.strip():
                      continue

                  feats = JavaCodeAnalyzer.extract_features(code)
                  X = np.array([feats[n] for n in feature_names]).reshape(1, -1)
                  X_scaled = scaler.transform(X)
                  proba = model.predict_proba(X_scaled)[0]
                  prediction = 1 if proba[1] >= 0.35 else 0

                  print(f'{f} -> Prediccion: {prediction} (prob VULN: {proba[1]:.3f})')

                  if prediction == 1:
                      vulnerable = True
                      bloque = f'\nArchivo: {f}\n'
                      bloque += f'Probabilidad de vulnerabilidad: {proba[1]*100:.1f}%\n'

                      if feats['dangerous_function_count'] > 0:
                          bloque += f'⚠️  Funciones peligrosas: {int(feats["dangerous_function_count"])}\n'

                      if feats['sql_pattern_count'] > 0:
                          bloque += f'⚠️  Patrones SQL sospechosos: {int(feats["sql_pattern_count"])}\n'

                      if feats['system_call_count'] > 0:
                          bloque += f'⚠️  Llamadas System: {int(feats["system_call_count"])}\n'

                      if feats['reflection_count'] > 0:
                          bloque += f'⚠️  Uso de reflexion: {int(feats["reflection_count"])}\n'

                      if feats['sanitization_count'] == 0:
                          bloque += '⚠️  No se detectaron mecanismos de sanitizacion\n'

                      bloque += '\n'
                      mensaje += bloque
                      reporte_completo += bloque

              except Exception as e:
                  print(f'ERROR ANALIZANDO {f}: {e}')

          if vulnerable:
              print(mensaje)
              with open('security_report.txt', 'w', encoding='utf-8') as reporte:
                  reporte.write(reporte_completo)
              print('VULNERABLE')
              sys.exit(1)
          else:
              print('SAFE')
              sys.exit(0)
          PYEOF
          PYTHONPATH=$GITHUB_WORKSPACE python3 /tmp/analyze.py

      - name: Telegram - Codigo SEGURO
        if: steps.analyze.outcome == 'success'
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
          -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d "text=✅ Código SEGURO. Análisis ML superado. Continuando pipeline."

      - name: Telegram - Codigo VULNERABLE
        if: steps.analyze.outcome == 'failure'
        run: |
          if [ -f security_report.txt ]; then
            MENSAJE=$(cat security_report.txt)
          else
            MENSAJE="No se pudo generar el reporte detallado."
          fi

          curl -s -G "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            --data-urlencode "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            --data-urlencode "text=❌ Vulnerabilidades detectadas en PR #${{ github.event.pull_request.number }}:

          $MENSAJE

          PR bloqueado."

      - name: Comentario en PR con resultado
        if: steps.analyze.outcome == 'failure'
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            let reporte = 'No se pudo leer el reporte.';
            try {
              reporte = fs.readFileSync('security_report.txt', 'utf8');
            } catch(e) {}

            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## ❌ Vulnerabilidades detectadas\n\n\`\`\`\n${reporte}\n\`\`\`\n\n> Pipeline bloqueado. Corrige las vulnerabilidades antes de hacer merge.`
            })

      - name: Create Issue
        if: steps.analyze.outcome == 'failure'
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            let reporte = 'Ver logs del pipeline para más detalles.';
            try {
              reporte = fs.readFileSync('security_report.txt', 'utf8');
            } catch(e) {}

            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Vulnerabilidad detectada en PR #${context.issue.number}`,
              body: `Se detectaron vulnerabilidades potenciales:\n\n\`\`\`\n${reporte}\n\`\`\``,
              labels: ["security-issue", "fixing-required"]
            })

      - name: Fail pipeline if vulnerabilities detected
        if: steps.analyze.outcome == 'failure'
        run: |
          echo "Se detectaron vulnerabilidades. Deteniendo pipeline."
          exit 1

  tests:
    runs-on: ubuntu-latest
    name: Unit Tests
    needs: security-check
    if: github.event_name == 'pull_request' && github.base_ref == 'test'

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Python tests
        run: |
          pytest tests/ -v --tb=short

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Run Java tests
        run: |
          mvn test

      - name: Telegram TEST SUCCESS
        if: success()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
          -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d "text=🧪 TESTS OK: Python y Java pasaron correctamente. Procediendo al deploy."

      - name: Telegram TEST FAIL
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
          -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d "text=❌ TESTS FALLARON. Pipeline detenido."

      - name: Create Issue for Failed Tests
        if: failure()
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Tests fallidos en PR #${context.issue.number}`,
              body: "Los tests del pipeline han fallado. Revisar logs para más detalles.",
              labels: ["tests-failed"]
            })

  merge-and-deploy:
    runs-on: ubuntu-latest
    name: Merge to Main and Deploy
    if: github.event_name == 'push' && github.ref == 'refs/heads/test'
    # SIN needs: tests

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

      - name: Merge test to main
        run: |
          git fetch origin main
          git checkout main
          git merge --no-ff origin/test -m "Auto-merge from test branch [skip ci]"
          git push origin main

      - name: Telegram - Merge exitoso
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
          -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d "text=🔀 Merge test→main exitoso. Iniciando deploy en Render..."

      - name: Deploy to Render
        run: |
          curl -s "${{ secrets.RENDER_DEPLOY_HOOK }}"

      - name: Telegram - Deploy exitoso
        if: success()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
          -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d "text=🚀 Deploy exitoso en Render. App online: https://secure-devops-pipeline-1.onrender.com"

      - name: Telegram - Deploy fallido
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
          -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d "text=💥 Falló el merge o deploy hacia main."
          