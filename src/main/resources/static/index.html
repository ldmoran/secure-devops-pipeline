<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Morán — Consultorio Médico</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header class="navbar">
        <div class="navbar-brand">
            <div class="navbar-logo">
                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
                </svg>
            </div>
            <div class="navbar-title">
                <span class="brand-name">Doctor Morán</span>
                <span class="brand-subtitle">Consultorio Médico</span>
            </div>
        </div>
        <div class="navbar-status">
            <span class="status-label">Estado del sistema</span>
            <div id="status-indicator" class="status-badge loading">Verificando…</div>
        </div>
    </header>

    <main class="container">

        <div class="page-title-row">
            <div>
                <h1 class="page-title">Gestión de Pacientes</h1>
                <p class="page-subtitle">Registro y administración de pacientes del consultorio</p>
            </div>
        </div>

        <section class="grid-2-col">

            <div class="card">
                <div class="card-header">
                    <div class="card-icon card-icon--blue">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
                        </svg>
                    </div>
                    <h2 id="form-title">Nuevo Paciente</h2>
                </div>

                <form id="user-form">
                    <input type="hidden" id="usuario-id">

                    <div class="form-group">
                        <label for="nombre">Nombre completo</label>
                        <input type="text" id="nombre" name="nombre" placeholder="Ej. Ana García López" required autocomplete="off">
                    </div>
                    <div class="form-group">
                        <label for="email">Correo electrónico</label>
                        <input type="email" id="email" name="email" placeholder="paciente@correo.com" required autocomplete="off">
                    </div>

                    <div class="form-buttons">
                        <button type="submit" id="btn-submit" class="btn btn-primary">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
                            </svg>
                            Registrar paciente
                        </button>
                        <button type="button" id="btn-cancel" class="btn btn-secondary hidden">
                            Cancelar
                        </button>
                    </div>
                </form>
                <div id="form-message" class="message hidden"></div>
            </div>

            <div class="card">
                <div class="card-header">
                    <div class="card-icon card-icon--green">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                        </svg>
                    </div>
                    <h2>Pacientes registrados</h2>
                </div>
                <div class="table-container">
                    <table id="users-table">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Nombre</th>
                                <th>Correo electrónico</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td colspan="4" class="text-center text-muted">
                                    <span class="loading-dots">Cargando pacientes</span>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </section>

    </main>

    <footer class="footer">
        <p>Doctor Morán &mdash; Consultorio Médico &copy; 2025</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
